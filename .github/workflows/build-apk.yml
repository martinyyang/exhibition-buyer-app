name: Build and Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
        cache: true

    - name: Create local.properties
      run: |
        echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
        echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

    - name: Create .env file
      run: |
        cat > .env << EOF
        SUPABASE_URL=${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
        EOF

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Get version from pubspec
      id: version
      run: |
        VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Rename APK with version
      run: |
        cp build/app/outputs/flutter-apk/app-release.apk exhibition-buyer-app-v${{ steps.version.outputs.version }}.apk

    - name: Upload APK artifact (backup)
      uses: actions/upload-artifact@v4
      with:
        name: exhibition-buyer-app-v${{ steps.version.outputs.version }}
        path: exhibition-buyer-app-v${{ steps.version.outputs.version }}.apk

    - name: Create or Update Latest Release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: 最新版本 (Latest Build)
        files: exhibition-buyer-app-v${{ steps.version.outputs.version }}.apk
        body: |
          ## 展会买手协同管理系统 - 最新构建版本

          **版本:** v${{ steps.version.outputs.version }}
          **构建时间:** ${{ github.event.head_commit.timestamp }}
          **提交:** ${{ github.sha }}

          ### 📦 安装方式
          1. 点击下方的 APK 文件直接下载到手机
          2. 允许安装未知来源应用（设置中开启）
          3. 点击 APK 文件安装

          ### 📱 直接下载链接
          [点击下载 APK](https://github.com/${{ github.repository }}/releases/download/latest/exhibition-buyer-app-v${{ steps.version.outputs.version }}.apk)

          ### 🐛 问题反馈
          如遇到问题，请在 [Issues](https://github.com/${{ github.repository }}/issues) 提交反馈
        prerelease: false
        draft: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Tagged Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: exhibition-buyer-app-v${{ steps.version.outputs.version }}.apk
        body: |
          ## 展会买手协同管理系统

          ### 📦 安装方式
          1. 下载下方的 APK 文件
          2. 传输到Android手机
          3. 允许安装未知来源应用
          4. 点击APK文件安装

          ### ✨ 更新内容
          请查看 [CHANGELOG.md](CHANGELOG.md)

          ### 🐛 问题反馈
          如遇到问题，请在 [Issues](https://github.com/${{ github.repository }}/issues) 提交反馈
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
